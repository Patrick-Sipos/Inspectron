name: Build Inspectron

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller (.spec) (Linux)
        run: |
          pyinstaller Inspectron.spec --clean

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inspectron-linux
          path: dist/Inspectron/**

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (.spec) (Windows)
        run: |
          pyinstaller Inspectron.spec --clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inspectron-windows
          path: dist/Inspectron/**

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (.spec) (macOS)
        run: |
          pyinstaller Inspectron.spec --clean

      - name: Verify .app bundle
        run: |
          if [ ! -d dist/Inspectron/Inspectron.app ]; then
            echo "ERROR: Inspectron.app was not built"
            ls -la dist/Inspectron || true
            exit 1
          fi

      - name: Code sign the app
        run: |
          if [ -d dist/Inspectron/Inspectron.app ]; then
            codesign -s - --deep --force dist/Inspectron/Inspectron.app
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inspectron-macos
          path: dist/Inspectron/Inspectron.app